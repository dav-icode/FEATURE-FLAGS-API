version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ff_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ff_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ff_secret}
      POSTGRES_DB: ${POSTGRES_DB:-feature_flags}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ff_user} -d ${POSTGRES_DB:-feature_flags}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ff_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ff_redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-ff_redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ff_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ff_user}:${POSTGRES_PASSWORD:-ff_secret}@postgres:5432/${POSTGRES_DB:-feature_flags}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ff_redis_secret}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-30}
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
